<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FATH Chat</title>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .msg {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 60%;
        }

        .user {
            background: #2563eb;
            margin-left: auto;
        }

        .bot {
            background: #374151;
        }

        #inputArea {
            display: flex;
            padding: 10px;
            background: #1e293b;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
    <input id="msg" placeholder="Savolingni yoz...">
    <button onclick="sendMsg()">Yubor</button>
</div>

<script>
function sendMsg() {
    let message = document.getElementById("msg").value;
    let chat = document.getElementById("chat");

    if (!message) return;

    chat.innerHTML += <div class="msg user">${message}</div>;

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "message=" + encodeURIComponent(message)
    })
    .then(res => res.text())  // 🔥 MUHIM
    .then(data => {
        chat.innerHTML += <div class="msg bot">${data}</div>;
        document.getElementById("msg").value = "";
        chat.scrollTop = chat.scrollHeight;
    })
    .catch(err => {
        chat.innerHTML += <div class="msg bot">Xato: ${err}</div>;
    });
}
</script>

</body>

<!-- fix -->
    
</html>
