<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FATH Chat</title>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .msg {
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 10px;
            max-width: 70%;
        }

        .user {
            background: #2563eb;
            margin-left: auto;
        }

        .bot {
            background: #1e293b;
            margin-right: auto;
        }

        #inputArea {
            display: flex;
            padding: 10px;
            background: #020617;
        }

        #msg {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
    <input id="msg" placeholder="Savol yoz...">
    <button onclick="send()">Yubor</button>
</div>

<script>
function send() {
    let message = document.getElementById("msg").value;
    let chat = document.getElementById("chat");

    if (!message) return;

    chat.innerHTML += <div class="msg user">${message}</div>;

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "message=" + encodeURIComponent(message)
    })
    .then(res => res.json())   // 🔥 MUHIM (text emas!)
    .then(data => {
        chat.innerHTML += <div class="msg bot">${data.reply}</div>;
        document.getElementById("msg").value = "";
        chat.scrollTop = chat.scrollHeight;
    })
    .catch(err => {
        chat.innerHTML += <div class="msg bot">Xato: ${err}</div>;
    });
}
</script>

</body>
</html>
