<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FATH Chat</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

#chat {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.msg {
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 70%;
}

.user {
    background: #2563eb;
    align-self: flex-end;
}

.bot {
    background: #334155;
    align-self: flex-start;
}

#inputBox {
    display: flex;
    padding: 10px;
    background: #1e293b;
}

input {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 5px;
}

button {
    margin-left: 10px;
    padding: 10px 20px;
    background: #2563eb;
    border: none;
    color: white;
    border-radius: 5px;
}
</style>

</head>

<body>

<div id="chat"></div>

<div id="inputBox">
    <input id="msg" placeholder="Savolingni yoz..." />
    <button onclick="send()">Yubor</button>
</div>

<script>
function send() {
    let message = document.getElementById("msg").value;
    let chat = document.getElementById("chat");

    // user msg
    chat.innerHTML += <div class="msg user">${message}</div>;

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "message=" + encodeURIComponent(message)
    })
    .then(res => res.json())
    .then(data => {
        chat.innerHTML += <div class="msg bot">${data.reply}</div>;
        document.getElementById("msg").value = "";
        chat.scrollTop = chat.scrollHeight;
    })
    .catch(err => {
        chat.innerHTML += <div class="msg bot">Xato: ${err}</div>;
    });
}
</script>

</body>
</html>

</body>
</html>
