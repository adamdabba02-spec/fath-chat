<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FATH Chat</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
display:flex;
align-items:center;
gap:10px;
padding:12px;
background:#111827;
border-bottom:1px solid #333;
}

.header img{
height:35px;
}

.header span{
font-size:20px;
font-weight:bold;
}

#messages{
flex:1;
overflow-y:auto;
padding:15px;
}

.msg{
max-width:70%;
padding:10px;
margin:8px 0;
border-radius:10px;
white-space:pre-wrap;
}

.user{
background:#2563eb;
margin-left:auto;
}

.bot{
background:#1f2937;
margin-right:auto;
}

.input{
display:flex;
border-top:1px solid #333;
padding:10px;
background:#111827;
}

textarea{
flex:1;
resize:none;
height:55px;
border-radius:8px;
border:none;
padding:10px;
font-size:14px;
}

button{
width:100px;
background:#22c55e;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}
</style>

</head>
<body>

<div class="header">
<img src="/static/logo.png">
<span>FATH</span>
</div>

<div id="messages"></div>

<div class="input">
<textarea id="text" placeholder="Xabar yoz..."></textarea>
<button onclick="send()">Send</button>
</div>

<script>
const messages = document.getElementById("messages");
const text = document.getElementById("text");


// 🔹 XOTIRA (frontend)
let chat_memory = [];

// 🔹 XABAR QO‘SHISH
function add(role, msg){
let div = document.createElement("div");
div.className = "msg " + role;
div.innerText = msg;
messages.appendChild(div);
messages.scrollTop = messages.scrollHeight;

// xotiraga yozish
chat_memory.push({role, msg});
}


// 🔹 XABAR YUBORISH
async function send(){
let msg = text.value.trim();
if(!msg) return;

add("user", msg);
text.value="";

try{
let res = await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
});

let data = await res.json();

// 🔥 MUHIM: reply bo‘sh bo‘lsa fallback
let reply = data.reply || "Bismillah...";

add("bot", reply);

}catch(e){
add("bot","Xatolik yuz berdi");
}
}


// 🔹 ENTER BOSISH
text.addEventListener("keydown",function(e){
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault();
send();
}
});
</script>

</body>
</html>
