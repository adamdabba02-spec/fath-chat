<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FATH Chat</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* HEADER */
#header{
    padding:15px;
    text-align:center;
    font-weight:bold;
    background:rgba(15,23,42,0.8);
    backdrop-filter:blur(10px);
    border-bottom:1px solid #1e293b;
}

/* CHAT */
#chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* MESSAGE */
.msg{
    padding:12px 16px;
    border-radius:16px;
    max-width:75%;
    animation:fade 0.2s ease;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

@keyframes fade{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

.user{
    align-self:flex-end;
    background:linear-gradient(135deg,#2563eb,#3b82f6);
}

.bot{
    align-self:flex-start;
    background:#1e293b;
}

/* INPUT */
#inputBox{
    display:flex;
    padding:10px;
    background:rgba(15,23,42,0.8);
    backdrop-filter:blur(10px);
    border-top:1px solid #1e293b;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
    background:#020617;
    color:white;
}

button{
    margin-left:10px;
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div id="header">⚡ FATH Chat</div>

<div id="chat"></div>

<div id="inputBox">
    <input id="msg" placeholder="Savolingni yoz...">
    <button onclick="send()">Yubor</button>
</div>

<script>

function send(){
    let input = document.getElementById("msg");
    let text = input.value.trim();
    if(!text) return;

    addMsg(text,"user");
    input.value="";

    let loading = document.createElement("div");
    loading.className="msg bot";
    loading.innerText="yozyapti...";
    document.getElementById("chat").appendChild(loading);
    scrollBottom();

    fetch("/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:text})
    })
    .then(res=>res.json())
    .then(data=>{
        loading.remove();
        addMsg(data.reply,"bot");
    });
}

function addMsg(text,type){
    let div=document.createElement("div");
    div.className="msg "+type;
    div.innerText=text;
    document.getElementById("chat").appendChild(div);
    scrollBottom();
}

function scrollBottom(){
    let chat=document.getElementById("chat");
    chat.scrollTop=chat.scrollHeight;
}

document.getElementById("msg").addEventListener("keypress",function(e){
    if(e.key==="Enter") send();
});

</script>

</body>
</html>
