<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FATH Chat</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* KONTEYNER */
.chat-container {
    max-width: 500px;
    margin: auto;
    height: 100dvh; /* 🔥 MUHIM */
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    padding: 10px;
    text-align: center;
    background: #111827;
    border-bottom: 1px solid #1f2937;
    flex-shrink: 0;
}

.logo {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

/* CHAT */
#chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
}

/* MESSAGE */
.msg {
    max-width: 75%;
    padding: 10px;
    border-radius: 15px;
    margin: 5px;
    word-wrap: break-word;
}

.user {
    background: #2563eb;
    align-self: flex-end;
}

.bot {
    background: #1e293b;
    align-self: flex-start;
}

/* INPUT */
.input-box {
    display: flex;
    padding: 10px;
    background: #111827;
    border-top: 1px solid #1f2937;
    flex-shrink: 0;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 12px 15px;
    border-radius: 10px;
    background: #22c55e;
    color: white;
    border: none;
}
</style>
</head>

<body>

<div class="chat-container">

<div class="header">
    <img src="/static/logo.png" class="logo">
    <div>FATH Chat</div>
</div>

<div id="chat"></div>

<div class="input-box">
    <input id="msg" placeholder="Xabar yoz..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">Yubor</button>
</div>

</div>

<script>
function addMessage(text, type) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function send() {
    let input = document.getElementById("msg");
    let msg = input.value.trim();

    if (!msg) return;

    addMessage(msg, "user");
    input.value = "";

    const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    });

    const data = await res.json();
    addMessage(data.reply, "bot");
}
</script>

</body>
</html>
