<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FATH Chat</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-box {
            width: 420px;
            max-width: 95%;
            height: 90vh;
            background: #111827;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        .header {
            padding: 18px;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            background: #1f2937;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            padding: 10px 14px;
            border-radius: 14px;
            max-width: 75%;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .user {
            background: #2563eb;
            align-self: flex-end;
        }

        .bot {
            background: #374151;
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            padding: 12px;
            background: #1f2937;
            gap: 10px;
        }

        #msg {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
            border-radius: 12px;
            background: #111827;
            color: white;
            font-size: 16px;
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="chat-box">
        <div class="header">⚡️ FATH Chat</div>

        <div id="chat"></div>

        <div class="input-area">
            <input id="msg" type="text" placeholder="Savolingni yoz...">
            <button onclick="sendMessage()">Yubor</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("msg");
            const chat = document.getElementById("chat");
            const message = input.value.trim();

            if (!message) return;

            chat.innerHTML += <div class="msg user">${message}</div>;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await res.json();

                chat.innerHTML += <div class="msg bot">${data.reply}</div>;
                chat.scrollTop = chat.scrollHeight;

            } catch (err) {
                chat.innerHTML += <div class="msg bot">xato: ${err}</div>;
                chat.scrollTop = chat.scrollHeight;
            }
        }

        document.getElementById("msg").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
