<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FATH Chat</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg, #0f172a, #1e293b);
    color: white;
}

/* KONTEYNER */
.chat-container {
    max-width: 500px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    text-align: center;
    padding: 18px;
    background: #111827;
    border-bottom: 1px solid #1f2937;
    font-size: 24px;
    font-weight: bold;
}

/* CHAT */
#chat {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
}

/* MESSAGE */
.msg {
    max-width: 75%;
    padding: 12px;
    border-radius: 15px;
    margin: 6px;
    font-size: 16px;
}

.user {
    background: #2563eb;
    align-self: flex-end;
}

.bot {
    background: #1e293b;
    align-self: flex-start;
}

/* INPUT */
.input-box {
    display: flex;
    padding: 12px;
    background: #111827;
    border-top: 1px solid #1f2937;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 15px;
}

button {
    margin-left: 10px;
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="chat-container">

    <!-- HEADER -->
    <div class="header">
        FATH Chat
    </div>

    <!-- CHAT -->
    <div id="chat"></div>

    <!-- INPUT -->
    <div class="input-box">
        <input id="msg" placeholder="Yoz..." />
        <button onclick="send()">Yubor</button>
    </div>

</div>

<script>
function send() {
    let input = document.getElementById("msg");
    let text = input.value.trim();
    if (!text) return;

    addMsg(text, "user");
    input.value = "";

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    })
    .then(res => res.json())
    .then(data => addMsg(data.reply, "bot"));
}

function addMsg(text, type) {
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
    div.scrollIntoView();
}

/* ENTER */
document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
