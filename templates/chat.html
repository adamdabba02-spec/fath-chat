<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FATH Chat</title>

<style>
body {
    margin:0;
    background:#0f172a;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container {
    width:400px;
    height:600px;
    background:#111827;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.header {
    padding:15px;
    background:#1f2937;
    text-align:center;
    font-weight:bold;
}

.chat {
    flex:1;
    overflow-y:auto;
    padding:10px;
}

.msg {
    max-width:75%;
    padding:10px;
    margin:8px;
    border-radius:12px;
    font-size:14px;
}

.user {
    background:#2563eb;
    margin-left:auto;
}

.bot {
    background:#374151;
    margin-right:auto;
}

.input-box {
    display:flex;
    padding:10px;
    background:#1f2937;
}

input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
    outline:none;
}

button {
    margin-left:10px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
    <div class="header">⚡️ FATH Chat</div>

    <div class="chat" id="chat"></div>

    <div class="input-box">
        <input id="msg" placeholder="Yozing..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
async function send(){
    let msg = document.getElementById("msg").value;
    if(!msg) return;

    add(msg,"user");

    let res = await fetch("/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:msg})
    });

    let data = await res.json();
    add(data.reply,"bot");

    document.getElementById("msg").value="";
    scrollDown();
}

function add(text,type){
    let div=document.createElement("div");
    div.className="msg "+type;
    div.innerText=text;
    document.getElementById("chat").appendChild(div);
}

function scrollDown(){
    let chat = document.getElementById("chat");
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
