<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FATH Chat</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    font-family: Arial;
    background: linear-gradient(180deg,#0f172a,#1e293b);
}

/* MAIN */
.wrapper {
    display: flex;
    flex-direction: column;
    height: 100%;
}

/* HEADER */
.header {
    text-align: center;
    padding: 15px;
    background: #111827;
    color: white;
    font-weight: bold;
    font-size: 20px;
    flex-shrink: 0;
}

/* CHAT */
#chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
}

/* MESSAGE */
.msg {
    max-width: 80%;
    padding: 10px;
    border-radius: 12px;
    margin: 5px;
    font-size: 14px;
    color: white;
}

.user {
    background: #2563eb;
    align-self: flex-end;
}

.bot {
    background: #1e293b;
    align-self: flex-start;
}

/* INPUT */
.input-box {
    display: flex;
    padding: 10px;
    background: #111827;
    flex-shrink: 0;
}

/* INPUT FIELD */
input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
}

/* BUTTON */
button {
    margin-left: 8px;
    padding: 12px 14px;
    border-radius: 10px;
    background: #22c55e;
    color: white;
    border: none;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="header">FATH Chat</div>

    <div id="chat"></div>

    <div class="input-box">
        <input id="msg" placeholder="Yoz..." />
        <button onclick="send()">Yubor</button>
    </div>

</div>

<script>
function send() {
    let input = document.getElementById("msg");
    let text = input.value.trim();
    if (!text) return;

    addMsg(text, "user");
    input.value = "";

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    })
    .then(res => res.json())
    .then(data => addMsg(data.reply, "bot"));
}

function addMsg(text, type) {
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
    div.scrollIntoView();
}

/* ENTER */
document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
