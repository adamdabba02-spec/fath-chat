<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FATH Chat</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #0b1629, #16263d);
}

/* HEADER */
.header {
    text-align: center;
    padding: 15px;
    font-size: 24px;
    font-weight: bold;
    color: white;
    border-bottom: 1px solid #1e2e4d;
}

/* CHAT AREA */
#chat {
    position: fixed;
    top: 55px;        /* header balandligi */
    bottom: 80px;     /* input balandligi */
    left: 0;
    right: 0;
    overflow-y: auto;
    padding: 10px;
}

/* MESSAGE */
.msg {
    max-width: 90%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 14px;
    font-size: 16px;
    line-height: 1.5;

    word-wrap: break-word;
    overflow-wrap: break-word;
    white-space: normal;
}

/* USER */
.user {
    background: #2563eb;
    color: white;
    margin-left: auto;
}

/* BOT */
.bot {
    background: #1e293b;
    color: white;
    margin-right: auto;
}

/* INPUT BOX */
.input-box {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    gap: 10px;
    padding: 10px;
    background: #0b1629;
}

input {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
}

button {
    margin-left: 10px;
    padding: 14px 18px;
    border: none;
    border-radius: 12px;
    background: #22c55e;
    color: white;
    font-size: 16px;
}

/* 📱 TELEFON */
@media (max-width: 600px) {
    .header {
        font-size: 22px;
    }

    .msg {
        font-size: 17px;
        max-width: 90%;
    }

    input {
        font-size: 16px;
    }
}
</style>
</head>

<body>

<div class="header">FATH Chat</div>

<div id="chat"></div>

<div class="input-box">
    <input id="msg" placeholder="Type message..." />
    <button onclick="send()">Send</button>
</div>

<script>
function addMessage(text, type) {
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = 999999;
}

function send() {
    let input = document.getElementById("msg");
    let text = input.value;
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    })
    .then(res => res.json())
    .then(data => {
        addMessage(data.reply, "bot");
    });
}

/* ENTER BOSSA YUBORADI */
document.getElementById("msg").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        send();
    }
});
</script>

</body>
</html>
