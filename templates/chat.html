<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FATH Chat</title>

<style>
body {
    margin: 0;
    background: #0f172a;
    color: white;
    font-family: Arial;
}

.header {
    padding: 15px;
    text-align: center;
    background: #111827;
}

#chat {
    height: 70vh;
    overflow-y: auto;
    padding: 10px;
}

.msg {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    max-width: 70%;
}

.user {
    background: #2563eb;
    margin-left: auto;
}

.bot {
    background: #1e293b;
}

.input-box {
    display: flex;
    padding: 10px;
    background: #111827;
}

input {
    flex: 1;
    padding: 10px;
}

button {
    padding: 10px;
    background: #22c55e;
    border: none;
    color: white;
}
</style>
</head>

<body>

<div class="header">FATH Chat</div>

<div id="chat"></div>

<div class="input-box">
<input id="msg">
<button onclick="send()">Send</button>
</div>

<script>
function addMessage(text, type) {
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
}

async function send() {
    let msg = document.getElementById("msg").value;

    addMessage(msg, "user");

    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    });

    let data = await res.json();
    addMessage(data.reply, "bot");
}
</script>

</body>
</html>
