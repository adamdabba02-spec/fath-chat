<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FATH Chat</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* KONTEYNER */
.chat-container {
    max-width: 500px;
    margin: auto;
    height: 100dvh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    padding: 10px;
    text-align: center;
    background: #111827;
    border-bottom: 1px solid #1f2937;
    flex-shrink: 0;
}

.logo {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

/* CHAT */
#chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
}

/* MESSAGE */
.msg {
    max-width: 75%;
    padding: 10px;
    border-radius: 15px;
    margin: 5px;
    word-wrap: break-word;
}

.user {
    background: #2563eb;
    align-self: flex-end;
}

.bot {
    background: #1e293b;
    align-self: flex-start;
}

/* INPUT */
.input-box {
    display: flex;
    padding: 10px;
    background: #111827;
    border-top: 1px solid #1f2937;
    flex-shrink: 0;
}
