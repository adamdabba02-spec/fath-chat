<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FATH Chat</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    background: #0f172a;
    color: white;
    font-family: Arial;
}

/* HEADER */
.header {
    padding: 15px;
    text-align: center;
    background: #111827;
    font-size: 20px;
}

/* CHAT */
#chat {
    height: calc(100vh - 120px);
    overflow-y: auto;
    padding: 10px;
}

/* MESSAGE */
.msg {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    max-width: 70%;
}

.user {
    background: #2563eb;
    margin-left: auto;
}

.bot {
    background: #1e293b;
}

/* INPUT */
.input-box {
    display: flex;
    padding: 10px;
    background: #111827;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
}

button {
    padding: 12px 18px;
    margin-left: 10px;
    background: #22c55e;
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="header">FATH Chat</div>

<div id="chat"></div>

<div class="input-box">
<input id="msg" placeholder="Type message..." onkeypress="if(event.key==='Enter') send()">
<button onclick="send()">Send</button>
</div>

<script>
function addMessage(text, type) {
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
}

async function send() {
    let input = document.getElementById("msg");
    let msg = input.value.trim();

    if (!msg) return;

    addMessage(msg, "user");
    input.value = "";

    try {
        let res = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: msg})
        });

        let data = await res.json();
        addMessage(data.reply, "bot");

    } catch {
        addMessage("Server error", "bot");
    }
}
</script>

</body>
</html>
