<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>FATH Chat</title>
<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
}
.chat-box {
  max-width:600px;
  margin:auto;
  margin-top:50px;
}
input {
  width:80%;
}
</style>
</head>

<body>
<div class="chat-box">
  <h2>⚡️ FATH Chat</h2>

  <div id="chat"></div>

  <input id="msg" placeholder="yoz...">
  <button onclick="sendMessage()">Yubor</button>
</div>

<script>
async function sendMessage() {
  let msg = document.getElementById("msg").value;

  let res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({msg:msg})
  });

  let data = await res.json();

  document.getElementById("chat").innerHTML +=
    "<div>"+data.reply+"</div>";
}
</script>

</body>
</html>
