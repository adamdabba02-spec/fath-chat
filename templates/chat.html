<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FATH Chat</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    height: 100vh;
}

.chat-container {
    max-width: 500px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    padding: 10px;
    text-align: center;
    background: #111827;
    border-bottom: 1px solid #1f2937;
}

.header img {
    width: 40px;
    display: block;
    margin: auto;
}

.header h2 {
    margin: 5px 0 0;
    font-size: 18px;
}

/* CHAT */
#chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
}

/* MESSAGE */
.msg {
    max-width: 75%;
    padding: 10px;
    border-radius: 15px;
    margin: 5px;
    word-wrap: break-word;
    animation: fade 0.2s ease;
}

.user {
    background: #2563eb;
    align-self: flex-end;
}

.bot {
    background: #1e293b;
    align-self: flex-start;
}

/* INPUT */
.input-box {
    display: flex;
    padding: 10px;
    background: #111827;
    position: sticky;
    bottom: 0;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: white;
}

/* ANIMATION */
@keyframes fade {
    from {opacity: 0; transform: translateY(5px);}
    to {opacity: 1;}
}
</style>
</head>

<body>

<div class="chat-container">

<div class="header">
    <img src="/static/logo.png" onerror="this.style.display='none'">
    <h2>FATH Chat</h2>
</div>

<div id="chat"></div>

<div class="input-box">
    <input id="msg" placeholder="Xabar yoz..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">Yubor</button>
</div>

</div>
