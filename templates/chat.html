<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FATH Chat</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.chat-box {
    width: 420px;
    height: 650px;
    background: #111827;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(0,0,0,0.35);
}

.header {
    padding: 18px;
    text-align: center;
    font-size: 30px;
    font-weight: bold;
    background: #1f2937;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.msg {
    max-width: 80%;
    padding: 12px 14px;
    border-radius: 14px;
    line-height: 1.4;
    word-wrap: break-word;
    font-size: 15px;
}

.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;
}

.bot {
    align-self: flex-start;
    background: #374151;
    color: white;
}

.input-area {
    display: flex;
    padding: 12px;
    gap: 10px;
    background: #1f2937;
}

#msg {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    outline: none;
    font-size: 15px;
}

button {
    padding: 12px 18px;
    border: none;
    border-radius: 12px;
    background: #22c55e;
    color: white;
    font-size: 14px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}
</style>
</head>
<body>

<div class="chat-box">
    <div class="header">⚡️ FATH Chat</div>

    <div id="chat"></div>

    <div class="input-area">
        <input id="msg" type="text" placeholder="Yozing..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Yubor</button>
    </div>
</div>

<script>
async function sendMessage() {
    const input = document.getElementById("msg");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    try {
        const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        addMessage(data.reply, "bot");
    } catch (e) {
        addMessage("Xatolik yuz berdi.", "bot");
    }
}

function addMessage(text, type) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
